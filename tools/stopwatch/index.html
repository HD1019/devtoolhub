<div class="breadcrumb"><a href="/devtoolhub/">首页</a> / 秒表 & 计时器</div>
<h1>⏱ 秒表 & 倒计时</h1>
<p class="tool-desc">精确计时秒表（毫秒级）和倒计时器。支持计次记录。</p>
<div class="ad-slot">广告位</div>
<div class="tool-workspace">
<div style="text-align:center">
<div style="font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:#f1f5f9;margin:1rem 0" id="display">00:00:00.000</div>
<div class="btn-group" style="justify-content:center">
<button class="btn btn-primary" id="startBtn" onclick="start()">▶ 开始</button>
<button class="btn btn-secondary" id="pauseBtn" onclick="pause()" style="display:none">⏸ 暂停</button>
<button class="btn btn-secondary" onclick="reset()">🔄 重置</button>
<button class="btn btn-secondary" onclick="lap()" id="lapBtn" disabled>📝 计次</button>
</div>
<div style="margin-top:1rem;display:flex;gap:.5rem;justify-content:center">
<span style="color:#64748b;font-size:.75rem;cursor:pointer" onclick="switchMode('stopwatch')" id="swLabel">秒表模式</span>
</div>
<div id="laps" style="margin-top:1rem;max-height:200px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:.8125rem;color:#94a3b8"></div>
</div>
</div>
<div class="ad-slot">广告位</div>
</main>
<footer class="footer"><p>© 2026 <a href="/devtoolhub/">DevTools</a></p></footer>
<script>
let startTime=0,elapsed=0,timer=null,running=false,laps=[];
const display=document.getElementById('display'),startBtn=document.getElementById('startBtn'),pauseBtn=document.getElementById('pauseBtn'),lapBtn=document.getElementById('lapBtn');
function update(){const t=running?elapsed+(Date.now()-startTime):elapsed;const ms=t%1000,s=Math.floor(t/1000)%60,m=Math.floor(t/60000)%60,h=Math.floor(t/3600000);display.textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`}
function start(){
if(running)return;running=true;startTime=Date.now();timer=setInterval(update,50);
startBtn.style.display='none';pauseBtn.style.display='';lapBtn.disabled=false;
}
function pause(){
if(!running)return;running=false;elapsed+=Date.now()-startTime;clearInterval(timer);update();
startBtn.style.display='';pauseBtn.style.display='none';startBtn.textContent='▶ 继续';
}
function reset(){
running=false;clearInterval(timer);elapsed=0;laps=[];update();
startBtn.style.display='';pauseBtn.style.display='none';startBtn.textContent='▶ 开始';
lapBtn.disabled=true;document.getElementById('laps').innerHTML='';
}
function lap(){
laps.push(elapsed+(running?Date.now()-startTime:0));
const t=laps[laps.length-1],ms=t%1000,s=Math.floor(t/1000)%60,m=Math.floor(t/60000)%60,h=Math.floor(t/3600000);
const lapTime=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`;
document.getElementById('laps').innerHTML+=`<div style="padding:.25rem 0;border-bottom:1px solid #1e293b">#${laps.length} ${lapTime}</div>`;
}
function switchMode(m){}
update();
</script>
