<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const mdInput=document.getElementById('mdInput'),mdPreview=document.getElementById('mdPreview');
function renderMarkdown(){
  if(typeof marked==='undefined'){
    mdPreview.innerHTML='<p style="color:#ef4444">Markdown渲染库加载中，请刷新页面重试。</p>';
    return;
  }
  try{
    marked.setOptions({breaks:true,gfm:true});
    mdPreview.innerHTML=marked.parse(mdInput.value||'');
  }catch(e){
    mdPreview.innerHTML='<p style="color:#ef4444">渲染错误：'+e.message+'</p>';
  }
}
function copyHTML(){navigator.clipboard.writeText(mdPreview.innerHTML)}
function clearMD(){mdInput.value='';mdPreview.innerHTML=''}
mdInput.value=`# Markdown 预览器
