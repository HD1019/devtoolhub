<body>

<h1>🎨 调色板生成器</h1>
<p class="tool-desc">选一个颜色，自动生成互补色、类似色、三角色等5种配色方案。前端设计、UI开发必备。</p>
<div class="ad-slot">广告位</div>
<div class="tool-workspace">
<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem">
<input type="color" id="baseColor" value="#3b82f6" onchange="generatePalettes()" style="width:50px;height:50px;border:none;border-radius:12px;cursor:pointer">
<span style="color:#f1f5f9;font-weight:600">选择基色</span>
</div>
<div class="schemes" id="schemes"></div>
</div>
<div class="ad-slot">广告位</div>
</main>
<footer class="footer"><p>© 2026 <a href="/devtoolhub/">DevTools</a></p></footer>
<script>
function hexToHsl(hex){
let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
const M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m;let h=0;
if(d){if(M===r)h=((g-b)/d+(g<b?6:0))*60;else if(M===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60}
const l=(M+m)/2,s=d?(d/(1-Math.abs(2*l-1)))*100:0;
return[Math.round(h),Math.round(s),Math.round(l*100)];
}
function hslToHex(h,s,l){s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
let r,g,b;if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
return'#'+[r,g,b].map(v=>Math.round((v+m)*255).toString(16).padStart(2,'0')).join('');}
function generatePalettes(){
const hex=document.getElementById('baseColor').value;
const[h,s,l]=hexToHsl(hex);
const schemes=[
{name:'互补色 Complementary',colors:[hex,hslToHex((h+180)%360,s,l)]},
{name:'类似色 Analogous',colors:Array.from({length:5},(_,i)=>hslToHex((h-60+i*30+360)%360,s,l))},
{name:'三角色 Triadic',colors:[hex,hslToHex((h+120)%360,s,l),hslToHex((h+240)%360,s,l)]},
{name:'单色系 Monochromatic',colors:Array.from({length:5},(_,i)=>hslToHex(h,s,Math.max(5,Math.min(95,l-30+i*15))))},
{name:'分裂互补 Split Complementary',colors:[hex,hslToHex((h+150)%360,s,l),hslToHex((h+210)%360,s,l)]}
];
document.getElementById('schemes').innerHTML=schemes.map(s=>`
<div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1rem">
<div style="color:#94a3b8;font-size:.75rem;margin-bottom:.5rem;font-weight:600">${s.name}</div>
<div class="palette">${s.colors.map(c=>`
<div class="swatch" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')" title="点击复制 ${c}">
<span>${c}</span>
</div>`).join('')}</div>
</div>`).join('');
}
generatePalettes();
</script>
