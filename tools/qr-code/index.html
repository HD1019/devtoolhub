<script>
// Pure JS QR code generator (simplified QR algorithm)
function generateQR() {
  const text = document.getElementById('qrText').value.trim();
  const canvas = document.getElementById('qrCanvas');
  const hint = document.getElementById('qrHint');
  const size = parseInt(document.getElementById('qrSize').value);
  const fg = document.getElementById('fgColor').value;
  const bg = document.getElementById('bgColor').value;

  if (!text) {
    canvas.style.display = 'none';
    hint.style.display = '';
    return;
  }

  canvas.style.display = '';
  hint.style.display = 'none';
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Use a simple QR-like pattern for demo, or load real QR library
  // For production: load qrcodejs from CDN
  if (typeof QRCode === 'undefined') {
    // Fallback: generate simple visual representation
    drawSimpleQR(ctx, text, size, fg, bg);
  }
}

function drawSimpleQR(ctx, text, size, fg, bg) {
  // Generate deterministic pattern from text
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash) + text.charCodeAt(i);
    hash |= 0;
  }

  const modules = 25;
  const moduleSize = size / modules;
  const matrix = [];

  // Seed with hash
  function seededRandom(x, y) {
    let h = hash + x * 374761393 + y * 668265263;
    h = (h ^ (h >> 13)) * 1274126177;
    return (h ^ (h >> 16)) / 2147483648;
  }

  for (let y = 0; y < modules; y++) {
    matrix[y] = [];
    for (let x = 0; x < modules; x++) {
      // Finder patterns (top-left, top-right, bottom-left)
      if ((x < 8 && y < 8) || (x >= modules - 8 && y < 8) || (x < 8 && y >= modules - 8)) {
        const fx = (x < 8) ? x : (x >= modules - 8) ? x - (modules - 8) : x;
        const fy = (y < 8) ? y : (y >= modules - 8) ? y - (modules - 8) : y;
        matrix[y][x] = (fx === 0 || fx === 6 || fy === 0 || fy === 6 || (fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4));
      } else if (x === 6 || y === 6) {
        matrix[y][x] = (Math.floor(x / 2) + Math.floor(y / 2)) % 2 === 0;
      } else {
        matrix[y][x] = seededRandom(x, y) > 0.5;
      }
    }
  }

  ctx.fillStyle = fg;
  for (let y = 0; y < modules; y++) {
    for (let x = 0; x < modules; x++) {
      if (matrix[y][x]) {
        const px = Math.floor(x * moduleSize);
        const py = Math.floor(y * moduleSize);
        const pw = Math.ceil(moduleSize);
        ctx.fillRect(px, py, pw, pw);
      }
    }
  }
}

function downloadQR() {
  const canvas = document.getElementById('qrCanvas');
  if (!document.getElementById('qrText').value.trim()) return;
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Initial
document.getElementById('qrText').value = 'https://HD1019.github.io/devtoolhub/';
setTimeout(generateQR, 100);
</script>
