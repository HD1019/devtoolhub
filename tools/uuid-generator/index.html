<script>
function generateUUID() {
  // Crypto-safe UUID v4
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  arr[6] = (arr[6] & 0x0f) | 0x40; // version 4
  arr[8] = (arr[8] & 0x3f) | 0x80; // variant
  const hex = Array.from(arr, b => b.toString(16).padStart(2,'0'));
  const uuid = [hex.slice(0,4).join(''),hex.slice(4,6).join(''),hex.slice(6,8).join(''),hex.slice(8,10).join(''),hex.slice(10).join('')].join('-');
  document.getElementById('uuidOutput').value = uuid;
  return uuid;
}
function copyUUID() {
  const v = document.getElementById('uuidOutput').value;
  if (v) navigator.clipboard.writeText(v).then(() => {
    const btn = event.target; btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '📋 复制', 1500);
  });
}
function generateMultiple() {
  const uuids = Array.from({length:50}, generateUUID);
  document.getElementById('multiList').innerHTML = '<div class="output-area">' +
    uuids.map((u,i) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid #1e293b"><span style="color:#64748b;font-size:.75rem;min-width:2rem">${i+1}</span><code style="color:#e2e8f0;font-size:.75rem">${u}</code><button class="copy-btn" onclick="navigator.clipboard.writeText(\'${u}\')">复制</button></div>`).join('') +
    '</div>';
}
generateUUID();
</script>
