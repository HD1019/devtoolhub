.diff-unchanged{color:#94a3b8}

<main class="tool-page" style="max-width:1100px">
  <div class="breadcrumb"><a href="/devtoolhub/">首页</a> / 文本差异对比</div>
  <h1>📊 文本差异对比 (Diff)</h1>
  <p class="tool-desc">粘贴两段文本，逐行对比差异。新增行绿色标记，删除行红色标记。</p>
  <div class="ad-slot">广告位</div>
  <div class="tool-workspace">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
      <div><label>原始文本 (A)</label><textarea id="textA" placeholder="粘贴原始文本…" style="min-height:180px"></textarea></div>
      <div><label>新文本 (B)</label><textarea id="textB" placeholder="粘贴新文本…" style="min-height:180px"></textarea></div>
    </div>
    <button class="btn btn-primary" onclick="doDiff()">🔍 对比差异</button>
    <button class="btn btn-secondary" onclick="swapTexts()">🔄 交换</button>
    <button class="btn btn-secondary" onclick="clearTexts()">🗑 清空</button>
    <div id="diffResult" style="margin-top:1rem"></div>
  </div>
  <div class="ad-slot">广告位</div>
</main>
<footer class="footer"><p>© 2026 <a href="/devtoolhub/">DevTools</a> · 差异对比在浏览器本地完成</p></footer>
<script>
function doDiff(){
  const a=document.getElementById('textA').value.split('\n');
  const b=document.getElementById('textB').value.split('\n');
  // Simple LCS-based diff
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);

  // Backtrack
  const result=[];
  let i=m,j=n;
  const stack=[];
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){stack.unshift({type:'same',text:a[i-1],lineA:i,lineB:j});i--;j--}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){stack.unshift({type:'added',text:b[j-1],lineB:j});j--}
    else{stack.unshift({type:'removed',text:a[i-1],lineA:i});i--}
  }

  let html='<div style="background:#0f172a;border-radius:8px;overflow:hidden;max-height:500px;overflow-y:auto">';
  let addedCount=0,removedCount=0;
  stack.forEach(item=>{
    if(item.type==='same'){
      html+=`<div class="diff-line diff-unchanged"><span class="diff-line-num">${item.lineA||''}</span><span class="diff-line-num">${item.lineB||''}</span>${escHtml(item.text)}</div>`;
    }else if(item.type==='added'){
      html+=`<div class="diff-line diff-added"><span class="diff-line-num"></span><span class="diff-line-num">+${item.lineB}</span>${escHtml(item.text)}</div>`;
      addedCount++;
    }else{
      html+=`<div class="diff-line diff-removed"><span class="diff-line-num">-${item.lineA}</span><span class="diff-line-num"></span>${escHtml(item.text)}</div>`;
      removedCount++;
    }
  });
  html+=`</div><p style="color:#94a3b8;font-size:.75rem;margin-top:.5rem"><span style="color:#16a34a">+${addedCount} 新增</span> · <span style="color:#ef4444">-${removedCount} 删除</span> · ${a.length} → ${b.length} 行</p>`;
  document.getElementById('diffResult').innerHTML=html;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function swapTexts(){const a=document.getElementById('textA'),b=document.getElementById('textB');[a.value,b.value]=[b.value,a.value]}
function clearTexts(){document.getElementById('textA').value='';document.getElementById('textB').value='';document.getElementById('diffResult').innerHTML=''}

// Sample
document.getElementById('textA').value='function hello() {\n  console.log("Hello World");\n  return true;\n}\n\n// Old comment\nconst x = 1;';
document.getElementById('textB').value='function hello() {\n  console.log("Hello, DevTools!");\n  return true;\n}\n\n// Updated comment\nconst x = 1;\nconst y = 2;';
</script>
