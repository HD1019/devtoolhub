<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>密码生成器 - 在线随机强密码生成工具 | DevTools</title>
<meta name="description" content="免费在线密码生成器：生成随机强密码，支持自定义长度和字符类型（大小写字母、数字、符号）。纯浏览器本地生成，安全可靠。">
<meta name="keywords" content="密码生成器,随机密码,强密码,password generator,密码在线生成">
<link rel="canonical" href="https://HD1019.github.io/devtoolhub/tools/password-generator/">
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav class="nav">
  <a href="/devtoolhub/" class="nav-logo">🛠 <span>Dev</span>Tools</a>
  <ul class="nav-links">
    <li><a href="/devtoolhub/">首页</a></li>
    <li><a href="/devtoolhub/#tools">工具</a></li>
  </ul>
</nav>

<main class="tool-page">
  <div class="breadcrumb"><a href="/devtoolhub/">首页</a> / 密码生成器</div>
  <h1>🔐 密码生成器</h1>
  <p class="tool-desc">一键生成高强度随机密码。可自定义长度和字符类型，所有密码在浏览器本地生成，不会上传或记录。</p>

  <div class="ad-slot">广告位</div>

  <div class="tool-workspace">
    <div style="margin-bottom:1.5rem">
      <label>密码长度：<strong id="lenVal">16</strong></label>
      <input type="range" class="slider" id="length" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generatePassword()">
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="upper" checked onchange="generatePassword()"> 大写字母 (A-Z)</label>
      <label><input type="checkbox" id="lower" checked onchange="generatePassword()"> 小写字母 (a-z)</label>
      <label><input type="checkbox" id="numbers" checked onchange="generatePassword()"> 数字 (0-9)</label>
      <label><input type="checkbox" id="symbols" onchange="generatePassword()"> 特殊符号 (!@#$%)</label>
    </div>

    <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;flex-wrap:wrap">
      <div style="flex:1;min-width:250px">
        <input type="text" class="tool-input" id="password" readonly style="font-size:1.125rem;letter-spacing:1px;min-height:auto;padding:.875rem 1rem;background:#0f172a">
      </div>
      <button class="btn btn-primary" onclick="generatePassword()">🔄 重新生成</button>
      <button class="btn btn-secondary" onclick="copyPassword()" id="copyBtn">📋 复制</button>
    </div>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthBar" style="width:100%;background:#4ade80"></div>
    </div>
    <p style="color:#94a3b8;font-size:.75rem;margin-top:.375rem" id="strengthLabel">强度：非常强</p>

    <div style="margin-top:1.5rem">
      <button class="btn btn-secondary" onclick="generateMultiple()">🎲 批量生成 5 个</button>
    </div>
    <div id="multiPasswords" style="margin-top:1rem"></div>
  </div>

  <div class="ad-slot">广告位</div>
</main>

<footer class="footer">
  <p>© 2026 <a href="/devtoolhub/">DevTools</a> · 密码在浏览器本地随机生成 · 不记录不上传</p>
</footer>

<script>
const CHARS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

function generatePassword() {
  const len = parseInt(document.getElementById('length').value);
  const useUpper = document.getElementById('upper').checked;
  const useLower = document.getElementById('lower').checked;
  const useNumbers = document.getElementById('numbers').checked;
  const useSymbols = document.getElementById('symbols').checked;

  let pool = '';
  if (useUpper) pool += CHARS.upper;
  if (useLower) pool += CHARS.lower;
  if (useNumbers) pool += CHARS.numbers;
  if (useSymbols) pool += CHARS.symbols;

  if (!pool) {
    document.getElementById('password').value = '请至少选择一种字符类型';
    document.getElementById('strengthBar').style.width = '0%';
    document.getElementById('strengthLabel').textContent = '无可用字符';
    return;
  }

  // Crypto-safe random
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pwd = '';
  for (let i = 0; i < len; i++) {
    pwd += pool[arr[i] % pool.length];
  }

  document.getElementById('password').value = pwd;
  updateStrength(pwd);
}

function updateStrength(pwd) {
  let score = 0;
  if (pwd.length >= 12) score++;
  if (pwd.length >= 20) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;

  const bar = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if (score <= 2) {
    bar.style.width = '33%'; bar.style.background = '#ef4444'; label.textContent = '强度：弱';
  } else if (score <= 4) {
    bar.style.width = '66%'; bar.style.background = '#f59e0b'; label.textContent = '强度：中等';
  } else {
    bar.style.width = '100%'; bar.style.background = '#4ade80'; label.textContent = '强度：非常强';
  }
}

function copyPassword() {
  const pwd = document.getElementById('password').value;
  if (!pwd || pwd.startsWith('请')) return;
  navigator.clipboard.writeText(pwd).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 1500);
  });
}

function generateMultiple() {
  const container = document.getElementById('multiPasswords');
  container.innerHTML = '<div style="display:grid;gap:.5rem;margin-top:.5rem">' +
    Array.from({length:5}, (_,i) => {
      generatePassword();
      return '<div style="background:#0f172a;padding:.625rem 1rem;border-radius:8px;display:flex;justify-content:space-between;align-items:center;font-family:monospace">' +
        '<span style="color:#94a3b8;font-size:.75rem">#' + (i+1) + '</span>' +
        '<span style="color:#e2e8f0">' + document.getElementById('password').value + '</span>' +
        '<button class="copy-btn" onclick="navigator.clipboard.writeText(\'' + document.getElementById('password').value + '\')">复制</button>' +
        '</div>';
    }).join('') +
    '</div>';
}

// Init
generatePassword();
</script>
</body>
</html>
