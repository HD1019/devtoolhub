  <div class="breadcrumb"><a href="/devtoolhub/">首页</a> / 颜色转换器</div>
  <h1>🎨 颜色格式转换器</h1>
  <p class="tool-desc">HEX、RGB、HSL 三种颜色格式互转。支持取色器和实时颜色预览。</p>
  <div class="ad-slot">广告位</div>
  <div class="tool-workspace">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
      <input type="color" id="colorPicker" value="#3b82f6" onchange="fromPicker()" style="width:60px;height:60px;border:none;border-radius:12px;cursor:pointer">
      <div id="colorPreview" style="width:60px;height:60px;border-radius:12px;background:#3b82f6;border:2px solid #334155"></div>
      <div>
        <div style="font-weight:600;color:#f1f5f9" id="colorName">Blue 500</div>
        <div style="color:#94a3b8;font-size:.75rem">选择或输入颜色值</div>

      <div>
        <label>HEX</label>
        <input type="text" class="tool-input" id="hexInput" placeholder="#000000" oninput="fromHEX()" style="min-height:auto;text-align:center;font-size:1rem">
      </div>
      <div>
        <label>RGB</label>
        <input type="text" class="tool-input" id="rgbInput" placeholder="rgb(0,0,0)" oninput="fromRGB()" style="min-height:auto;text-align:center;font-size:1rem">
      </div>

        <label>HSL</label>
        <input type="text" class="tool-input" id="hslInput" placeholder="hsl(0,0%,0%)" oninput="fromHSL()" style="min-height:auto;text-align:center;font-size:1rem">

<script>
const hexIn=document.getElementById('hexInput'),rgbIn=document.getElementById('rgbInput'),hslIn=document.getElementById('hslInput'),picker=document.getElementById('colorPicker'),preview=document.getElementById('colorPreview');

function updateAll(hex,r,g,b) {
  const h=hex;
  hexIn.value=h;rgbIn.value=`rgb(${r},${g},${b})`;
  const [hue,s,l]=rgbToHsl(r,g,b);
  hslIn.value=`hsl(${hue},${s}%,${l}%)`;
  picker.value=h;preview.style.background=h;
  setColorName(h);
}

function fromPicker(){const h=picker.value;const[r,g,b]=hexToRgb(h);updateAll(h,r,g,b)}
function fromHEX(){let v=hexIn.value.trim();if(!v.startsWith('#'))v='#'+v;if(/^#[0-9a-fA-F]{6}$/.test(v)){const[r,g,b]=hexToRgb(v);updateAll(v,r,g,b)}}
function fromRGB(){const m=rgbIn.value.match(/rgb\(?\s*(\d+)\s*[, ]\s*(\d+)\s*[, ]\s*(\d+)\s*\)?/);if(m){const r=Math.min(255,Math.max(0,+m[1])),g=Math.min(255,Math.max(0,+m[2])),b=Math.min(255,Math.max(0,+m[3]));const h=rgbToHex(r,g,b);updateAll(h,r,g,b)}}
function fromHSL(){const m=hslIn.value.match(/hsl\(?\s*(\d+)\s*[, ]\s*(\d+)%\s*[, ]\s*(\d+)%\s*\)?/);if(m){const[r,g,b]=hslToRgb(+m[1],+m[2],+m[3]);const h=rgbToHex(r,g,b);updateAll(h,r,g,b)}}

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m;let h=0;if(d){if(M===r)h=((g-b)/d+(g<b?6:0))*60;else if(M===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60}const l=(M+m)/2,s=d?(d/(1-Math.abs(2*l-1)))*100:0;return[Math.round(h),Math.round(s),Math.round(l*100)]}
function hslToRgb(h,s,l){s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let[r,g,b]=[0,0,0];if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)]}

function setColorName(h){const[r,g,b]=hexToRgb(h);const names={'#ef4444':'Red 500','#f97316':'Orange 500','#eab308':'Yellow 500','#22c55e':'Green 500','#3b82f6':'Blue 500','#8b5cf6':'Violet 500','#ec4899':'Pink 500','#000000':'Black','#ffffff':'White','#6b7280':'Gray 500'};document.getElementById('colorName').textContent=names[h]||'Custom Color'}
function copyAll(){const t=`HEX: ${hexIn.value}\nRGB: ${rgbIn.value}\nHSL: ${hslIn.value}`;navigator.clipboard.writeText(t)}

fromPicker();
</script>
